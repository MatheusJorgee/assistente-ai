<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quinta-Feira Runtime Events</title>
    <style>
      body { font-family: Consolas, 'Courier New', monospace; background: #0b1020; color: #dbeafe; margin: 0; padding: 16px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      #status { margin-bottom: 10px; padding: 8px 10px; border-radius: 6px; background: #1e293b; }
      #events { white-space: pre-wrap; background: #020617; border: 1px solid #334155; padding: 12px; border-radius: 8px; height: 75vh; overflow: auto; }
      .ok { color: #22c55e; }
      .bad { color: #f87171; }
      button { margin-top: 10px; padding: 8px 12px; border-radius: 6px; border: 0; background: #2563eb; color: #fff; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Observabilidade em Tempo Real - Quinta-Feira</h1>
    <div id="status">Conectando...</div>
    <div id="events"></div>
    <button id="pingBtn">Enviar ping</button>

    <script>
      const statusEl = document.getElementById('status');
      const eventsEl = document.getElementById('events');
      const pingBtn = document.getElementById('pingBtn');

      const wsUrl = 'ws://127.0.0.1:8000/runtime/events/ws';
      const ws = new WebSocket(wsUrl);

      function log(line) {
        const now = new Date().toISOString();
        eventsEl.textContent += `[${now}] ${line}\n`;
        eventsEl.scrollTop = eventsEl.scrollHeight;
      }

      ws.onopen = () => {
        statusEl.innerHTML = `<span class="ok">Conectado:</span> ${wsUrl}`;
        log('socket aberto');
      };

      ws.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          log(JSON.stringify(payload, null, 2));
        } catch {
          log(event.data);
        }
      };

      ws.onclose = () => {
        statusEl.innerHTML = '<span class="bad">Desconectado</span>';
        log('socket fechado');
      };

      ws.onerror = () => {
        statusEl.innerHTML = '<span class="bad">Erro no websocket</span>';
        log('erro no websocket');
      };

      pingBtn.addEventListener('click', () => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send('ping');
          log('ping enviado');
        }
      });
    </script>
  </body>
</html>
